<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diogo Mota - DevOps Engineer</title>
  <link rel="icon" type="image/png" href="assets/xp/Windows_logo.png">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="desktop-shell" data-desktop>
    <nav class="desktop-icons" aria-label="Desktop shortcuts">
      <button class="desktop-icon" type="button" data-open-window="profile-window">
        <img src="assets/xp/my_computer.png" alt="" aria-hidden="true">
        <span>My Computer</span>
      </button>
      <a class="desktop-icon" href="posts.html">
        <img src="assets/xp/textdoc.png" alt="" aria-hidden="true">
        <span>Posts</span>
      </a>
      <a class="desktop-icon" href="projects.html">
        <img src="assets/xp/editor.png" alt="" aria-hidden="true">
        <span>Projects</span>
      </a>
      <a class="desktop-icon" href="recommendations.html">
        <img src="assets/xp/mywebsite.png" alt="" aria-hidden="true">
        <span>Recommendations</span>
      </a>
      <button class="desktop-icon" type="button" data-open-window="profile-window">
        <img src="assets/xp/my_network_places.png" alt="" aria-hidden="true">
        <span>My Network Places</span>
      </button>
      <button class="desktop-icon" type="button" data-close-window="profile-window">
        <img src="assets/xp/recycle_bin.png" alt="" aria-hidden="true">
        <span>Recycle Bin</span>
      </button>
    </nav>

    <main class="xp-window y2k-window" id="profile-window" data-window data-task-title="Diogo Mota" aria-label="Diogo Mota personal homepage">
      <header class="title-bar">
        <div class="title-copy">
          <img class="title-icon-img" src="assets/xp/my_computer.png" alt="" aria-hidden="true">
          <span>Diogo Mota - DevOps Engineer</span>
        </div>
        <div class="window-controls">
          <button class="window-button minimize" type="button" data-window-action="minimize" aria-label="Minimize window"></button>
          <button class="window-button maximize" type="button" data-window-action="maximize" aria-label="Maximize window"></button>
          <button class="window-button close" type="button" data-window-action="close" aria-label="Close window"></button>
        </div>
      </header>

      <section class="home-panel window-body">
        <div class="hero-layout">
          <figure class="photo-frame">
            <img src="assets/diogo.jpg" alt="Photo of Diogo Mota">
            <span class="bubble bubble-large"></span>
            <span class="corner-sparkle sparkle-a"></span>
            <span class="corner-sparkle sparkle-b"></span>
          </figure>

          <section class="identity-panel" aria-labelledby="profile-name">
            <span class="orbit-line" aria-hidden="true"></span>
            <span class="bubble bubble-small"></span>
            <h1 id="profile-name" class="chrome-name" data-text="Diogo Mota">Diogo Mota</h1>

            <div class="info-stack" aria-label="Profile information">
              <div class="info-badge">
                <span class="badge-icon devops-icon" aria-hidden="true"></span>
                <span>DevOps Engineer</span>
              </div>
              <div class="info-badge">
                <span class="badge-icon workplace-icon" aria-hidden="true"></span>
                <span>Richemont</span>
              </div>
            </div>
          </section>
        </div>

        <nav class="nav-buttons" aria-label="Primary">
          <a class="y2k-button posts" href="posts.html">
            <span class="button-icon"><img src="assets/xp/textdoc.png" alt="" aria-hidden="true"></span>
            <span class="button-label">Posts</span>
          </a>
          <a class="y2k-button projects" href="projects.html">
            <span class="button-icon"><img src="assets/xp/editor.png" alt="" aria-hidden="true"></span>
            <span class="button-label">Projects</span>
          </a>
          <a class="y2k-button recommendations" href="recommendations.html">
            <span class="button-icon"><img src="assets/xp/mywebsite.png" alt="" aria-hidden="true"></span>
            <span class="button-label">Recommendations</span>
          </a>
        </nav>
      </section>
    </main>

    <footer class="taskbar" aria-label="Windows XP taskbar">
      <div class="start-menu" id="start-menu" data-start-menu role="menu" aria-hidden="true">
        <header class="start-menu-header">
          <span class="user-pic"><img src="assets/diogo.jpg" alt="" aria-hidden="true"></span>
          <span class="user-name">Diogo Mota</span>
        </header>
        <div class="start-menu-applications">
          <section class="start-menu-column menu-left" aria-label="Pinned programs">
            <a class="start-item featured" href="index.html">
              <img src="assets/xp/exploraricone.png" alt="" aria-hidden="true">
              <span><strong>Internet</strong><small>Diogo Mota Homepage</small></span>
            </a>
            <a class="start-item featured" href="projects.html">
              <img src="assets/xp/editor.png" alt="" aria-hidden="true">
              <span><strong>Projects</strong><small>Current work</small></span>
            </a>
            <div class="start-divider"></div>
            <a class="start-item" href="posts.html"><img src="assets/xp/textdoc.png" alt="" aria-hidden="true"><span>Posts</span></a>
            <a class="start-item" href="recommendations.html"><img src="assets/xp/mywebsite.png" alt="" aria-hidden="true"><span>Recommendations</span></a>
            <button class="start-item" type="button" data-open-window="profile-window"><img src="assets/xp/commandPrompt.png" alt="" aria-hidden="true"><span>Open Profile</span></button>
            <button class="start-item all-programs" type="button" data-open-window="profile-window"><span>All Programs</span><img src="assets/xp/programs_arrow.png" alt="" aria-hidden="true"></button>
          </section>
          <section class="start-menu-column menu-right" aria-label="Places">
            <button class="start-item" type="button" data-open-window="profile-window"><img src="assets/xp/myrecent.png" alt="" aria-hidden="true"><span>My Recent Documents</span></button>
            <button class="start-item" type="button" data-open-window="profile-window"><img src="assets/xp/mymusic.png" alt="" aria-hidden="true"><span>My Music</span></button>
            <button class="start-item" type="button" data-open-window="profile-window"><img src="assets/xp/my_computer.png" alt="" aria-hidden="true"><span>My Computer</span></button>
            <button class="start-item" type="button" data-open-window="profile-window"><img src="assets/xp/my_network_places.png" alt="" aria-hidden="true"><span>My Network Places</span></button>
            <div class="start-divider"></div>
            <button class="start-item" type="button" data-open-window="profile-window"><img src="assets/xp/controlpanel.png" alt="" aria-hidden="true"><span>Control Panel</span></button>
            <button class="start-item" type="button" data-open-window="profile-window"><img src="assets/xp/printers.png" alt="" aria-hidden="true"><span>Printers and Faxes</span></button>
            <div class="start-divider"></div>
            <button class="start-item" type="button" data-open-window="profile-window"><img src="assets/xp/helpsupport.png" alt="" aria-hidden="true"><span>Help and Support</span></button>
            <button class="start-item" type="button" data-open-window="profile-window"><img src="assets/xp/search.png" alt="" aria-hidden="true"><span>Search</span></button>
            <button class="start-item" type="button" data-open-window="profile-window"><img src="assets/xp/run.png" alt="" aria-hidden="true"><span>Run...</span></button>
          </section>
        </div>
        <footer class="start-menu-bottom">
          <button type="button" data-close-window="profile-window"><img src="assets/xp/log-off-icon-8379-Windows.ico" alt="" aria-hidden="true">Log Off</button>
          <button type="button" data-close-window="profile-window"><img src="assets/xp/Shutdown_Box_Red.png" alt="" aria-hidden="true">Shut Down</button>
        </footer>
      </div>

      <button class="start-button" type="button" data-start-button aria-controls="start-menu" aria-expanded="false">
        <img src="assets/xp/Windows_logo.png" alt="" aria-hidden="true">
        <span>start</span>
      </button>
      <ul class="quick-launch" aria-label="Quick launch">
        <li><a href="index.html"><img src="assets/xp/exploraricone.png" alt="Homepage"></a></li>
        <li><a href="posts.html"><img src="assets/xp/textdoc.png" alt="Posts"></a></li>
        <li><a href="projects.html"><img src="assets/xp/editor.png" alt="Projects"></a></li>
      </ul>
      <button class="task-button is-active" type="button" data-restore-window="profile-window">
        <img src="assets/xp/my_computer.png" alt="" aria-hidden="true">
        <span>Diogo Mota</span>
      </button>
      <div class="system-tray">
        <img src="assets/xp/msn16.png" alt="" aria-hidden="true">
        <img src="assets/xp/my_network_places.png" alt="" aria-hidden="true">
        <span data-clock>--:--</span>
      </div>
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
