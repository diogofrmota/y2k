<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Diogo Mota - DevOps Engineer</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="cosmic-backdrop" aria-hidden="true">
    <div class="grid-plane"></div>
    <div class="starfield" data-starfield></div>
  </div>

  <main class="y2k-window" aria-label="Diogo Mota personal homepage">
    <header class="title-bar">
      <div class="title-copy">
        <span class="title-star" aria-hidden="true">&#9733;</span>
        <span>Diogo Mota - DevOps Engineer :: Homepage</span>
        <span class="title-star" aria-hidden="true">&#9733;</span>
      </div>
      <div class="window-controls" aria-hidden="true">
        <span class="window-button minimize"></span>
        <span class="window-button maximize"></span>
        <span class="window-button close"></span>
      </div>
    </header>

    <section class="home-panel">
      <div class="chrome-beads" aria-hidden="true">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="hero-layout">
        <figure class="photo-frame">
          <img src="assets/diogo.jpg" alt="Photo of Diogo Mota">
          <span class="bubble bubble-large"></span>
          <span class="corner-sparkle sparkle-a"></span>
          <span class="corner-sparkle sparkle-b"></span>
          <span class="blue-star"></span>
        </figure>

        <section class="identity-panel" aria-labelledby="profile-name">
          <span class="orbit-line" aria-hidden="true"></span>
          <span class="dot-matrix" aria-hidden="true"></span>
          <span class="bubble bubble-small"></span>
          <span class="bubble bubble-medium"></span>
          <span class="tiny-sparkle twinkle-one"></span>
          <span class="tiny-sparkle twinkle-two"></span>

          <h1 id="profile-name" class="chrome-name" data-text="Diogo Mota">Diogo Mota</h1>

          <div class="info-stack" aria-label="Profile information">
            <div class="info-badge">
              <span class="badge-icon devops-icon" aria-hidden="true"></span>
              <span>DevOps Engineer</span>
              <span class="badge-shine" aria-hidden="true"></span>
            </div>
            <div class="info-badge">
              <span class="badge-icon workplace-icon" aria-hidden="true"></span>
              <span>Richemont</span>
              <span class="badge-shine" aria-hidden="true"></span>
            </div>
          </div>
        </section>
      </div>

      <nav class="nav-buttons" aria-label="Primary">
        <a class="y2k-button posts" href="posts.html">
          <span class="button-icon document-icon" aria-hidden="true"></span>
          <span class="button-label">Posts</span>
          <span class="button-arrow" aria-hidden="true"></span>
        </a>
        <a class="y2k-button projects" href="projects.html">
          <span class="button-icon code-icon" aria-hidden="true">&lt;/&gt;</span>
          <span class="button-label">Projects</span>
          <span class="button-arrow" aria-hidden="true"></span>
        </a>
        <a class="y2k-button recommendations" href="recommendations.html">
          <span class="button-icon star-icon" aria-hidden="true"></span>
          <span class="button-label">Recommendations</span>
          <span class="button-arrow" aria-hidden="true"></span>
        </a>
      </nav>

      <div class="globe-badge" aria-hidden="true">
        <span class="wing left-wing"></span>
        <span class="globe"></span>
        <span class="wing right-wing"></span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
