<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Posts :: Diogo Mota</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="cosmic-backdrop" aria-hidden="true">
    <div class="grid-plane"></div>
    <div class="starfield" data-starfield></div>
  </div>

  <main class="y2k-window page-window" aria-label="Posts page">
    <header class="title-bar">
      <div class="title-copy">
        <span class="title-star" aria-hidden="true">&#9733;</span>
        <span>Diogo Mota :: Posts</span>
        <span class="title-star" aria-hidden="true">&#9733;</span>
      </div>
      <div class="window-controls" aria-hidden="true">
        <span class="window-button minimize"></span>
        <span class="window-button maximize"></span>
        <span class="window-button close"></span>
      </div>
    </header>

    <section class="simple-page-panel">
      <span class="orbit-line page-orbit" aria-hidden="true"></span>
      <h1 class="page-title">Posts</h1>
      <a class="back-button" href="index.html">
        <span class="button-arrow reverse" aria-hidden="true"></span>
        <span>Back to Home</span>
      </a>
      <div class="globe-badge" aria-hidden="true">
        <span class="wing left-wing"></span>
        <span class="globe"></span>
        <span class="wing right-wing"></span>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
